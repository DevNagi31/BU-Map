<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BU Campus Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass: rgba(8, 8, 12, 0.82);
      --glass-border: rgba(255,255,255,0.07);
      --glass-hover: rgba(255,255,255,0.04);
      --accent: #006747;
      --accent-bright: #00c978;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.50);
      --text-muted: rgba(255,255,255,0.25);
      --radius: 16px;
      --radius-sm: 10px;
      --blur: blur(24px);
      --shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0e;
      overflow: hidden;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas { display: block; }

    /* ── Loading Screen ─────────────────────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    #loading.done { opacity: 0; visibility: hidden; pointer-events: none; }

    #loading .logo-big {
      width: 72px; height: 72px;
      background: var(--accent);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 30px;
      color: white;
      margin-bottom: 28px;
      box-shadow: 0 0 40px rgba(0,103,71,0.3);
      animation: pulse-logo 2s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%, 100% { box-shadow: 0 0 40px rgba(0,103,71,0.3); transform: scale(1); }
      50% { box-shadow: 0 0 60px rgba(0,103,71,0.5); transform: scale(1.04); }
    }

    #loading h2 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .loader-bar .fill {
      height: 100%;
      width: 30%;
      background: var(--accent-bright);
      border-radius: 3px;
      animation: load-slide 1.2s ease-in-out infinite;
    }
    @keyframes load-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(600%); }
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    #header {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 24px 10px 14px;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      box-shadow: var(--shadow);
      z-index: 10;
      pointer-events: none;
      animation: fade-down 0.6s ease 0.8s both;
    }
    @keyframes fade-down {
      from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    #header .logo {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: white;
      flex-shrink: 0;
    }

    #header .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    #header .header-text p {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ── Search ─────────────────────────────────────────────────────────── */
    #search-box {
      position: absolute;
      top: 84px;
      left: 24px;
      width: 300px;
      z-index: 20;
      animation: fade-in 0.5s ease 1s both;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    #search-box .search-wrap {
      position: relative;
    }

    #search-box .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      line-height: 1;
    }
    #search-box .search-icon svg {
      width: 16px; height: 16px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #search-input {
      width: 100%;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 12px 48px 12px 44px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      box-shadow: var(--shadow);
    }
    #search-input::placeholder { color: var(--text-muted); font-weight: 400; }
    #search-input:focus {
      border-color: rgba(0,103,71,0.5);
      box-shadow: var(--shadow), 0 0 0 3px rgba(0,103,71,0.12);
    }

    .search-shortcut {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      background: rgba(255,255,255,0.06);
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
      letter-spacing: 0.02em;
    }

    #search-results {
      display: none;
      margin-top: 6px;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      max-height: 320px;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }

    .search-result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(0,103,71,0.1); }

    .result-type {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent-bright);
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(0,201,120,0.08);
      padding: 3px 8px;
      border-radius: 6px;
    }

    /* ── Info Panel ──────────────────────────────────────────────────────── */
    #info-panel {
      position: absolute;
      right: 24px;
      top: 84px;
      width: 320px;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      color: white;
      transform: translateX(360px);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 20;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    #info-panel.visible { transform: translateX(0); }

    .panel-accent-bar {
      height: 3px;
      background: var(--accent);
      transition: background 0.3s;
    }

    .panel-content { padding: 20px 22px 22px; }

    #info-panel .building-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-bright);
      background: rgba(0,201,120,0.08);
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    #info-panel h2 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 16px;
      color: white;
      letter-spacing: -0.02em;
    }

    #info-panel .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 14px 0;
    }

    .stats-row {
      display: flex;
      gap: 2px;
    }
    .stat-block {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
    }
    .stat-block:first-child { border-radius: 8px 0 0 8px; }
    .stat-block:last-child { border-radius: 0 8px 8px 0; }
    .stat-icon {
      font-size: 14px;
      margin-bottom: 4px;
      opacity: 0.5;
    }
    .stat-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .stat-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    #info-panel .description {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-top: 14px;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .panel-actions button {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn-outline {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      border: 1px solid var(--glass-border) !important;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: #007a54; }

    #info-panel .close-btn {
      position: absolute;
      top: 18px;
      right: 16px;
      background: rgba(255,255,255,0.06);
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      width: 28px; height: 28px;
      border-radius: 8px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      pointer-events: all;
      z-index: 2;
    }
    #info-panel .close-btn:hover {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    /* ── Room navigation ────────────────────────────────────────────────── */
    #panel-room-nav { display: none; }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .nav-step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .nav-step:last-child { margin-bottom: 0; }

    .step-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(0,201,120,0.1);
      border: 1px solid rgba(0,201,120,0.25);
      color: var(--accent-bright);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-text {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      padding-top: 2px;
    }
    .step-text strong { color: var(--text-primary); font-weight: 600; }

    /* ── Legend ──────────────────────────────────────────────────────────── */
    #legend {
      position: absolute;
      left: 24px;
      bottom: 28px;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      color: white;
      z-index: 10;
      box-shadow: var(--shadow);
      animation: fade-in 0.5s ease 1.2s both;
      transition: all 0.3s ease;
    }

    #legend h3 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.15s;
    }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-item:hover { color: var(--text-primary); }

    .legend-color {
      width: 12px; height: 12px;
      border-radius: 4px;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(0,0,0,0.3);
    }

    /* ── Controls Hint ──────────────────────────────────────────────────── */
    #controls-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
      pointer-events: none;
      animation: fade-in 0.5s ease 1.4s both;
      transition: opacity 0.5s ease;
    }

    .hint-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .hint-chip .hint-key {
      font-weight: 700;
      color: var(--text-secondary);
      font-size: 10px;
      background: rgba(255,255,255,0.06);
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* Route indicator in panel */
    .route-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(0,201,120,0.06);
      border: 1px solid rgba(0,201,120,0.15);
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-bright);
    }
    .route-info .route-dot {
      width: 8px; height: 8px;
      background: var(--accent-bright);
      border-radius: 50%;
      flex-shrink: 0;
      animation: route-pulse 1.5s ease-in-out infinite;
    }
    @keyframes route-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── Tooltip ─────────────────────────────────────────────────────────── */
    #tooltip {
      position: absolute;
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: white;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      z-index: 30;
      display: none;
      border: 1px solid var(--glass-border);
      white-space: nowrap;
      box-shadow: var(--shadow);
      letter-spacing: -0.01em;
    }
    #tooltip .tt-type {
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: var(--accent-bright);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    /* ── Scrollbar ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #header { padding: 8px 16px 8px 10px; gap: 10px; }
      #header .header-text h1 { font-size: 13px; }
      #search-box { width: 220px; left: 12px; top: 76px; }
      #info-panel { width: 280px; right: 12px; top: 76px; }
      #legend { left: 12px; bottom: 16px; }
      #controls-hint { display: none; }
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading">
    <div class="logo-big">BU</div>
    <h2>Binghamton University</h2>
    <div class="loader-bar"><div class="fill"></div></div>
  </div>

  <div id="canvas-container">
    <!-- Header -->
    <div id="header">
      <div class="logo">BU</div>
      <div class="header-text">
        <h1>Binghamton University</h1>
        <p>Campus Map &middot; Vestal, NY</p>
      </div>
    </div>

    <!-- Info panel -->
    <div id="info-panel">
      <div class="panel-accent-bar" id="panel-accent"></div>
      <div class="panel-content">
        <button class="close-btn" id="close-btn">&#x2715;</button>
        <div class="building-tag" id="panel-tag">Building</div>
        <h2 id="panel-name">Building Name</h2>
        <div class="divider"></div>
        <div class="stats-row">
          <div class="stat-block">
            <div class="stat-icon">&#x25A3;</div>
            <div class="stat-value" id="panel-floors">&mdash;</div>
            <div class="stat-label">Floors</div>
          </div>
          <div class="stat-block">
            <div class="stat-icon">&#x2302;</div>
            <div class="stat-value" id="panel-type">&mdash;</div>
            <div class="stat-label">Type</div>
          </div>
          <div class="stat-block">
            <div class="stat-icon">&#x2316;</div>
            <div class="stat-value" id="panel-address">&mdash;</div>
            <div class="stat-label">Code</div>
          </div>
        </div>
        <p class="description" id="panel-desc"></p>

        <div id="panel-room-nav">
          <div class="divider"></div>
          <div class="nav-label">Getting There</div>
          <div id="panel-nav-steps"></div>
        </div>

        <div class="panel-actions">
          <button class="btn-outline" id="btn-fly">Fly There</button>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div id="search-box">
      <div class="search-wrap">
        <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input id="search-input" type="text" placeholder="Search buildings, rooms..." autocomplete="off" spellcheck="false" />
        <span class="search-shortcut" id="search-shortcut-hint">/</span>
      </div>
      <div id="search-results"></div>
    </div>

    <!-- Legend -->
    <div id="legend">
      <h3>Building Types</h3>
      <div id="legend-items"></div>
    </div>

    <!-- Controls -->
    <div id="controls-hint">
      <div class="hint-chip"><span class="hint-key">WASD</span> Walk</div>
      <div class="hint-chip"><span class="hint-key">Drag</span> Pan</div>
      <div class="hint-chip"><span class="hint-key">Scroll</span> Zoom</div>
      <div class="hint-chip"><span class="hint-key">Click</span> Select</div>
      <div class="hint-chip"><span class="hint-key">/</span> Search</div>
    </div>

    <div id="tooltip"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
